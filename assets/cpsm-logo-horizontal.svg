<svg xmlns="http://www.w3.org/2000/svg" width="1250" height="420" viewBox="0 0 1250 420" role="img" aria-labelledby="title desc">
  <title id="title">CPSM Client Portfolio Service Manager logo</title>
  <desc id="desc">Approved CPSM logo lockup with navigation wheel emblem, CPSM abbreviation, and Client Portfolio Service Manager wordmark.</desc>
  <defs>
    <linearGradient id="navyDepth" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#061a35" />
      <stop offset="1" stop-color="#082b63" />
    </linearGradient>
    <linearGradient id="blueAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b7cff" />
      <stop offset="1" stop-color="#1f6feb" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#061a35" flood-opacity="0.16" />
    </filter>
  </defs>

  <g transform="translate(165 210)" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#softShadow)">
    <circle r="124" stroke="url(#blueAccent)" stroke-width="7" />
    <circle r="105" stroke="url(#navyDepth)" stroke-width="20" />
    <circle r="76" stroke="#ffffff" stroke-width="8" />
    <circle r="61" stroke="url(#navyDepth)" stroke-width="8" />
    <circle r="49" stroke="#0b7cff" stroke-width="4" stroke-dasharray="2 12" />

    <path d="M0 0 L0 -86 M0 0 L61 -61 M0 0 L86 0 M0 0 L61 61 M0 0 L0 86 M0 0 L-61 61 M0 0 L-86 0 M0 0 L-61 -61" stroke="#061a35" stroke-width="7" />

    <path d="M-83 -82 A118 118 0 0 1 -25 -114" stroke="#0b7cff" stroke-width="8" />
    <path d="M82 82 A118 118 0 0 1 116 22" stroke="#e89a00" stroke-width="8" stroke-dasharray="4 12" />
    <path d="M-82 82 A118 118 0 0 0 -26 114" stroke="#061a35" stroke-width="7" stroke-dasharray="2 12" opacity="0.85" />

    <g fill="#ffffff" stroke-width="9">
      <circle cx="0" cy="-86" r="21" stroke="#0b7cff" />
      <circle cx="61" cy="-61" r="21" stroke="#e89a00" />
      <circle cx="86" cy="0" r="21" stroke="#0b7cff" />
      <circle cx="61" cy="61" r="21" stroke="#0b7cff" />
      <circle cx="0" cy="86" r="21" stroke="#0b7cff" />
      <circle cx="-61" cy="61" r="21" stroke="#e89a00" />
      <circle cx="-86" cy="0" r="21" stroke="#0b7cff" />
      <circle cx="-61" cy="-61" r="21" stroke="#0b7cff" />
    </g>

    <g fill="url(#navyDepth)" stroke="none">
      <path d="M0 -164 L18 -116 L-18 -116 Z" />
      <path d="M0 164 L18 116 L-18 116 Z" />
      <path d="M-164 0 L-116 18 L-116 -18 Z" />
      <path d="M164 0 L116 18 L116 -18 Z" />
      <circle r="40" />
    </g>
    <circle r="27" fill="#ffffff" stroke="none" />
    <circle r="18" fill="#e89a00" stroke="none" />
  </g>

  <g transform="translate(370 104)">
    <text x="0" y="158" fill="url(#navyDepth)" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="190" font-weight="900" letter-spacing="-11">CPSM</text>
    <polygon points="69,83 123,62 108,111" fill="#e89a00" />
    <polygon points="704,6 784,6 744,80" fill="#0b7cff" />
    <text x="4" y="214" fill="#061a35" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="800" letter-spacing="10">CLIENT PORTFOLIO SERVICE MANAGER</text>
  </g>
