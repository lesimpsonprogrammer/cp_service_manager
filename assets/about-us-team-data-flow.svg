<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-label="Momentum Data team turning documents into organized data">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#03122d"/>
      <stop offset="0.48" stop-color="#0a3c91"/>
      <stop offset="1" stop-color="#12c7f4"/>
    </linearGradient>
    <radialGradient id="glow" cx="57%" cy="42%" r="58%">
      <stop offset="0" stop-color="#3ceaff" stop-opacity="0.78"/>
      <stop offset="0.45" stop-color="#1f6feb" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#03122d" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .wire{fill:none;stroke:#39e9ff;stroke-width:5;stroke-linecap:round;opacity:.9;filter:url(#softGlow)}
      .wire2{fill:none;stroke:#ff8a3d;stroke-width:4;stroke-linecap:round;opacity:.9;filter:url(#softGlow)}
      .thin{fill:none;stroke:#9af8ff;stroke-width:2;opacity:.48}
      .panel{fill:#071f50;stroke:#4df1ff;stroke-width:3;filter:url(#softGlow)}
      .screen{fill:#08285f;stroke:#4df1ff;stroke-width:3}
      .cyan{fill:#35e8ff}.orange{fill:#ff8a3d}.blue{fill:#1f6feb}.paper{fill:#eaf4ff;stroke:#78f0ff;stroke-width:3}.suit{fill:#061b42}.suit2{fill:#0d4f99}.skin{fill:#d8a784}.skin2{fill:#a96f4a}.hair{fill:#071322}.table{fill:#071a3f}.shadow{fill:#020916;opacity:.35}
    </style>
  </defs>

  <rect width="1400" height="900" rx="44" fill="url(#bg)"/>
  <rect width="1400" height="900" rx="44" fill="url(#glow)"/>
  <g opacity="0.22" stroke="#9af8ff" stroke-width="1">
    <path d="M90 170H1320M90 310H1320M90 450H1320M90 590H1320M90 730H1320"/>
    <path d="M220 90V810M450 90V810M680 90V810M910 90V810M1140 90V810"/>
  </g>

  <!-- source documents -->
  <g transform="translate(70 160)">
    <rect class="paper" x="0" y="40" width="96" height="126" rx="12"/>
    <path class="thin" d="M20 78h54M20 108h62M20 138h44"/>
    <rect class="paper" x="116" y="0" width="102" height="136" rx="12" opacity=".94"/>
    <path class="thin" d="M138 42h55M138 74h66M138 106h46"/>
    <rect class="paper" x="54" y="208" width="108" height="128" rx="12" opacity=".88"/>
    <path class="thin" d="M78 246h54M78 278h64M78 310h44"/>
    <path class="orange" d="M206 222h78c12 0 22 10 22 22v64H184v-64c0-12 10-22 22-22z"/>
    <path fill="#ffb370" d="M184 250h122v58H184z"/>
    <g font-family="Arial, sans-serif" font-size="20" fill="#8cf3ff" opacity=".55">
      <text x="12" y="400">0101 1100</text>
      <text x="36" y="438">1010 0111</text>
      <text x="4" y="476">0011 1001</text>
    </g>
  </g>

  <!-- lightning/data transfer -->
  <path class="wire" d="M260 310 C410 240 510 270 620 348 S810 455 984 356"/>
  <path class="wire" d="M260 392 C420 382 520 410 642 458 S812 515 998 488"/>
  <path class="wire" d="M260 474 C410 560 548 615 700 575 S840 600 1000 650"/>
  <path class="wire2" d="M290 356 382 318 350 388 470 344 428 430 575 376"/>
  <path class="wire2" d="M785 405 860 360 838 430 930 392 902 468 1015 418"/>

  <!-- transformation panels -->
  <g transform="translate(515 180)">
    <rect class="panel" x="0" y="0" width="130" height="360" rx="26"/>
    <circle class="cyan" cx="42" cy="76" r="9"/><circle class="orange" cx="88" cy="112" r="9"/><circle class="cyan" cx="50" cy="176" r="9"/><circle class="orange" cx="94" cy="230" r="9"/><circle class="cyan" cx="56" cy="294" r="9"/>
    <path class="thin" d="M42 76L88 112L50 176L94 230L56 294"/>
  </g>
  <g transform="translate(720 145)">
    <rect class="panel" x="0" y="0" width="158" height="440" rx="28"/>
    <g opacity=".8">
      <rect class="cyan" x="36" y="62" width="24" height="92" rx="8"/>
      <rect class="cyan" x="76" y="100" width="24" height="54" rx="8"/>
      <rect class="cyan" x="116" y="44" width="24" height="110" rx="8"/>
      <rect class="cyan" x="36" y="210" width="92" height="14" rx="7"/>
      <rect class="cyan" x="36" y="255" width="70" height="14" rx="7"/>
      <rect class="cyan" x="36" y="300" width="108" height="14" rx="7"/>
    </g>
    <circle class="orange" cx="120" cy="370" r="12"/>
  </g>

  <!-- team at work -->
  <g transform="translate(255 585)">
    <ellipse class="shadow" cx="415" cy="195" rx="440" ry="58"/>
    <path class="table" d="M76 128h680l72 120H10z"/>
    <path fill="#1f6feb" opacity=".35" d="M120 150h574l32 48H86z"/>
    <g transform="translate(95 12)">
      <circle class="skin" cx="54" cy="56" r="36"/>
      <path class="suit" d="M8 154c12-50 34-73 46-73s40 23 56 73z"/>
      <path class="hair" d="M24 46c8-36 62-44 80-2-18-10-48-4-66 16z"/>
    </g>
    <g transform="translate(318 4)">
      <circle class="skin2" cx="56" cy="62" r="40"/>
      <path class="suit2" d="M8 164c16-58 35-82 48-82s42 24 60 82z"/>
      <path class="hair" d="M20 46c14-38 72-34 84 4-18-10-54-6-74 16z"/>
    </g>
    <g transform="translate(562 25)">
      <circle class="skin" cx="54" cy="54" r="34"/>
      <path class="suit" d="M10 150c12-48 32-70 44-70s39 22 54 70z"/>
      <path class="hair" d="M24 36c16-30 60-26 72 6-16-8-44-5-60 12z"/>
    </g>
    <rect x="365" y="138" width="150" height="90" rx="12" fill="#eaf4ff" opacity=".95"/>
    <path class="thin" d="M394 170h88M394 198h62"/>
  </g>

  <!-- structured outputs -->
  <g transform="translate(1035 170)">
    <rect class="screen" x="0" y="0" width="275" height="165" rx="20"/>
    <circle class="cyan" cx="60" cy="64" r="34" opacity=".9"/>
    <path class="thin" d="M122 48h104M122 82h86M122 116h120"/>
    <rect class="screen" x="0" y="210" width="275" height="110" rx="20"/>
    <path class="thin" d="M35 260h190M35 286h150"/>
    <circle class="orange" cx="235" cy="286" r="8"/>
    <rect class="screen" x="0" y="360" width="275" height="130" rx="20"/>
    <path class="wire" d="M32 442 78 405 122 430 170 378 226 414"/>
    <ellipse class="screen" cx="140" cy="610" rx="104" ry="32"/>
    <path class="screen" d="M36 610v96c0 22 46 40 104 40s104-18 104-40v-96"/>
    <path class="thin" d="M36 656c0 22 46 40 104 40s104-18 104-40M36 702c0 22 46 40 104 40s104-18 104-40"/>
    <circle class="orange" cx="208" cy="658" r="7"/><circle class="orange" cx="208" cy="704" r="7"/>
  </g>
</svg>
